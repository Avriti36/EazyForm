services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: formly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
      - postgres
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
